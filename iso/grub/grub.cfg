# ============================================================
#  Reasonix Router - GRUB 配置
#  支持: BIOS (i386-pc) + UEFI (x86_64-efi)
#  支持: 裸机 + 虚拟机
# ============================================================

set default="0"
set timeout=5

# 主题颜色
set menu_color_normal=cyan/black
set menu_color_highlight=white/blue

# 检测 UEFI 模式
if [ "${grub_platform}" = "efi" ]; then
    # UEFI 模式
    insmod efi_gop
    insmod efi_uga
    insmod all_video
    set gfxmode=auto
    set gfxpayload=keep
    terminal_output gfxterm
else
    # BIOS 模式
    insmod all_video
    insmod gfxterm
    insmod vbe
    insmod vga
    if loadfont /boot/grub/fonts/unicode.pf2 2>/dev/null; then
        set gfxmode=1024x768
        set gfxpayload=keep
        terminal_output gfxterm
    fi
fi

# 加载必要模块
insmod part_msdos
insmod part_gpt
insmod ext2
insmod iso9660
insmod udf

# 背景颜色
background_color #0f1923

# ─── 菜单项 ────────────────────────────────────────────────

menuentry "🛜  Reasonix Router v1.0 — 正常运行" {
    echo "Starting Reasonix Router..."
    linux /boot/vmlinuz quiet console=tty0 console=ttyS0,115200n8
    initrd /boot/initramfs.gz
}

menuentry "🛜  Reasonix Router (详细模式)" {
    echo "Starting with verbose logging..."
    linux /boot/vmlinuz console=tty0 console=ttyS0,115200n8 loglevel=7
    initrd /boot/initramfs.gz
}

menuentry "🛜  Reasonix Router (安全模式)" {
    echo "Starting in single-user mode..."
    linux /boot/vmlinuz single console=tty0
    initrd /boot/initramfs.gz
}

menuentry "🛜  Reasonix Router (VGA 兼容模式)" {
    echo "Starting with VGA fallback..."
    linux /boot/vmlinuz quiet nomodeset vga=normal
    initrd /boot/initramfs.gz
}

menuentry "💿 安装到硬盘" {
    echo "Starting system installer..."
    linux /boot/vmlinuz reasonix.install=1 quiet
    initrd /boot/initramfs.gz
}

menuentry "🔍 内存检测 (memtest86+)" {
    echo "Running memory test..."
    linux /boot/memtest86.bin 2>/dev/null || echo "Not available"
}

menuentry "🔁 重启" {
    reboot
}

menuentry "⏻ 关机" {
    halt
}
