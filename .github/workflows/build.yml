name: Build Reasonix Router ISO
on:
  workflow_dispatch:
  push: { branches: [main] }

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: sudo apt install -y -qq xorriso wget

      - name: 下载 Ubuntu ISO
        run: |
          rm -f ubuntu-router/dist/ubuntu-24.04-live-server-amd64.iso 2>/dev/null
          mkdir -p ubuntu-router/dist
          echo "下载 Ubuntu 24.04 ISO (2.6GB)..."
          URLS=(
            "https://mirrors.ustc.edu.cn/ubuntu-releases/24.04/ubuntu-24.04-live-server-amd64.iso"
            "https://mirrors.aliyun.com/ubuntu-releases/24.04/ubuntu-24.04-live-server-amd64.iso"
            "https://releases.ubuntu.com/24.04/ubuntu-24.04-live-server-amd64.iso"
          )
          for url in "${URLS[@]}"; do
            echo "尝试: $url"
            wget -q --timeout=120 -O ubuntu-router/dist/ubuntu-24.04-live-server-amd64.iso "$url" && break
            echo "失败, 换下一个..."
          done
          if [ ! -s ubuntu-router/dist/ubuntu-24.04-live-server-amd64.iso ]; then
            echo "所有镜像都下载失败!"
            exit 1
          fi
          ls -lh ubuntu-router/dist/ubuntu-24.04-live-server-amd64.iso

      - name: 构建路由 ISO
        run: |
          set -ex
          ISO="ubuntu-router/dist/ubuntu-24.04-live-server-amd64.iso"
          echo "ISO 大小: $(du -h $ISO | cut -f1)"

          echo "=== 解压 ISO ==="
          xorriso -osirrox on -indev "$ISO" -extract / /tmp/iso 2>&1
          ls /tmp/iso/ | head -10
          echo "解压后大小: $(du -sh /tmp/iso | cut -f1)"

          echo "=== 注入 autoinstall ==="
          mkdir -p /tmp/iso/nocloud
          cp ubuntu-router/autoinstall/user-data /tmp/iso/nocloud/
          touch /tmp/iso/nocloud/meta-data
          echo "OK"

          echo "=== 注入 WebUI ==="
          mkdir -p /tmp/iso/var/www/html/cgi-bin
          cp -r ubuntu-router/webui/* /tmp/iso/var/www/html/ 2>/dev/null || true
          echo "OK"

          echo "=== 修改 GRUB ==="
          find /tmp/iso/boot/grub -name "grub.cfg" | while read f; do
            echo "修改: $f"
            sed -i 's|linux	/casper/vmlinuz|linux	/casper/vmlinuz autoinstall ds=nocloud\;s=/cdrom/nocloud\;|g' "$f"
          done
          echo "OK"

          echo "=== 打包 ISO ==="
          rm -f ubuntu-router/dist/ubuntu-reasonix-router-24.04.iso
          xorriso -as mkisofs -r -V "ReasonixRouter" \
            -J -joliet-long \
            -o ubuntu-router/dist/ubuntu-reasonix-router-24.04.iso \
            /tmp/iso 2>&1
          ls -lh ubuntu-router/dist/ubuntu-reasonix-router-24.04.iso

      - name: 上传
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-reasonix-router-iso
          path: ubuntu-router/dist/ubuntu-reasonix-router-24.04.iso
