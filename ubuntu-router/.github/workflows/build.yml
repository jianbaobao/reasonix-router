name: Build Reasonix Router ISO

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt update -qq
          sudo apt install -y -qq xorriso wget

      - name: 生成定制 ISO
        run: |
          chmod +x rebuild-iso.sh
          sudo ./rebuild-iso.sh

      - name: 上传 ISO
        uses: actions/upload-artifact@v4
        with:
          name: reasonix-router-iso
          path: dist/ubuntu-reasonix-router-24.04.iso
          compression-level: 0
